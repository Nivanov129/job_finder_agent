# Job Agent — локальный стек: пайплайн + self-host web-поиск + прогрев модели
# эмбеддингов. Запускается на машине участника, ничего не хостится централизованно.
#
# Перед запуском:
#   - положить рядом config.json (валидный по config.schema.json), резюме,
#     шаблоны и search-map.md в каталог данных (по умолчанию ./data);
#   - в config.json указать web_search.url = http://searxng:8080 (имя сервиса
#     в compose-сети, а не localhost).
#
# Always-on: ночной мониторинг требует включённого хоста (см. README).

name: job-agent

services:
  # Прогрев модели эмбеддингов: один раз скачивает фиксированную мультиязычную
  # модель в общий том models, дальше пайплайн берёт её из кэша без сети. Имя
  # модели берётся из кода (`embeddings.MODEL_NAME`), чтобы не дублировать и не
  # рассинхронизироваться. Сервис завершается успехом.
  model-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-agent:latest
    environment:
      FASTEMBED_CACHE_PATH: /models
    entrypoint: ["python", "-c"]
    command:
      - "from fastembed import TextEmbedding; from job_agent.embeddings import MODEL_NAME; TextEmbedding(model_name=MODEL_NAME); print('embedding model ready:', MODEL_NAME)"
    volumes:
      - model_cache:/models
    restart: "no"

  # Self-host web-поиск для анализа компании на стадии скоринга.
  searxng:
    image: searxng/searxng:latest
    environment:
      # Внутри compose-сети пайплайн ходит на http://searxng:8080.
      SEARXNG_BASE_URL: http://searxng:8080/
      # Секрет подписи сессий локального инстанса — из env/.env, не хардкод.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-job-agent-local-dev-secret}
    volumes:
      # Версионируемый override (use_default_settings + json-формат), чтобы
      # web-поиск работал на свежей установке без ручной правки тома.
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      # Открыт на localhost для отладки/калибровки; продукт не хостит наружу.
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  # Основной пайплайн: по умолчанию ночной инкрементальный прогон по расписанию.
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-agent:latest
    depends_on:
      model-init:
        condition: service_completed_successfully
      searxng:
        condition: service_started
    environment:
      FASTEMBED_CACHE_PATH: /models
      JOB_AGENT_SEEN_DB: /var/lib/job-agent/job_agent_seen.db
      # Web-поиск (контакты) работает без настройки в UI — дефолтный SearXNG из стека.
      JOB_AGENT_SEARXNG_URL: http://searxng:8080
    env_file:
      # Секреты и токены авторизации AI-движков (CLAUDE_CODE_OAUTH_TOKEN,
      # OPENAI_API_KEY, ANTHROPIC_API_KEY, OLLAMA_API_KEY, Telethon, токен бота) — только через
      # .env в каталоге данных, его пишет страница web-UI «AI · авторизация».
      - path: ./data/.env
        required: false
    volumes:
      # Данные участника: config.json, резюме, шаблоны, карта поиска, выходной xlsx.
      - ${JOB_AGENT_DATA:-./data}:/data
      # Кэш модели эмбеддингов (read-only — пишет только model-init).
      - model_cache:/models:ro
      # Том для seen-store (дедуп/водяной знак nightly) — переживает пересоздание.
      - seen_store:/var/lib/job-agent
      # Изолированный конфиг-дир CLI-агентов (claude/codex): по умолчанию свой
      # каталог под ./data/auth (НЕ трогаем host ~/.claude — иначе контейнер
      # засоряет историю/сессии и гонит refresh токена). Чтобы переиспользовать
      # host-логин, задать JOB_AGENT_CLAUDE_DIR=~/.claude (аналогично codex).
      - ${JOB_AGENT_CLAUDE_DIR:-./data/auth/claude}:/root/.claude
      - ${JOB_AGENT_CODEX_DIR:-./data/auth/codex}:/root/.codex
    restart: unless-stopped

  # Web-UI (экраны «Настройка»/«Подборка») в браузере. Тот же образ, но вместо
  # ночного прогона поднимает FastAPI-приложение uvicorn'ом. Внутри слушает
  # 0.0.0.0, наружу опубликован только на loopback хоста — продукт не хостится
  # наружу. Форма сохранения пишет /data/config.json (валидный по схеме).
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-agent:latest
    environment:
      # webui лежит в /app (не отдельный пакет) — кладём его на путь импорта.
      PYTHONPATH: /app
      # Та же seen-БД и тот же web-поиск, что у пайплайна: прогоны из UI должны
      # копить «виденное» на постоянном томе и ходить в SearXNG по compose-сети.
      JOB_AGENT_SEEN_DB: /var/lib/job-agent/job_agent_seen.db
      JOB_AGENT_SEARXNG_URL: http://searxng:8080
      # Кэш модели эмбеддингов на томе — иначе UI качает её заново при каждой
      # пересборке образа (как у пайплайна; наполняет model-init).
      FASTEMBED_CACHE_PATH: /models
    depends_on:
      searxng:
        condition: service_started
      model-init:
        condition: service_completed_successfully
    env_file:
      # Те же токены авторизации, что у пайплайна: статус-пробы и «Проверить» на
      # странице «AI · авторизация» должны видеть ту же авторизацию.
      - path: ./data/.env
        required: false
    entrypoint: ["python", "-c"]
    command:
      - "import uvicorn; from webui.app import create_app; uvicorn.run(create_app('/data/config.json'), host='0.0.0.0', port=8765)"
    volumes:
      # Тот же каталог данных, что и у пайплайна: читает/пишет config.json и .env.
      - ${JOB_AGENT_DATA:-./data}:/data
      # Тот же изолированный конфиг-дир CLI-агентов, что у пайплайна (см. выше).
      - ${JOB_AGENT_CLAUDE_DIR:-./data/auth/claude}:/root/.claude
      - ${JOB_AGENT_CODEX_DIR:-./data/auth/codex}:/root/.codex
      # Постоянный seen-store (тот же том, что у пайплайна) — «виденное»
      # переживает пересборку образа.
      - seen_store:/var/lib/job-agent
      # Кэш модели эмбеддингов (read-only — пишет только model-init).
      - model_cache:/models:ro
    ports:
      # Опубликован на всех интерфейсах хоста — UI доступен из локальной сети
      # (http://<IP-хоста>:8766). ВНИМАНИЕ: у UI нет аутентификации, а форма
      # перезаписывает config.json — включать только в доверенной LAN. Чтобы
      # вернуть loopback-only, поставить "127.0.0.1:8766:8765".
      # Внутри контейнера приложение слушает 8765 (дефолт UI); наружу публикуем
      # на 8766, т.к. 8765 на хосте может быть занят другим сервисом.
      - "0.0.0.0:8766:8765"
    restart: unless-stopped

volumes:
  model_cache:
  seen_store:
  searxng_config:
