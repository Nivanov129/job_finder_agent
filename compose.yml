# Job Agent — локальный стек: пайплайн + self-host web-поиск + прогрев модели
# эмбеддингов. Запускается на машине участника, ничего не хостится централизованно.
#
# Перед запуском:
#   - положить рядом config.json (валидный по config.schema.json), резюме,
#     шаблоны и search-map.md в каталог данных (по умолчанию ./data);
#   - в config.json указать web_search.url = http://searxng:8080 (имя сервиса
#     в compose-сети, а не localhost).
#
# Always-on: ночной мониторинг требует включённого хоста (см. README).

name: job-agent

services:
  # Прогрев модели эмбеддингов: один раз скачивает фиксированную мультиязычную
  # модель в общий том models, дальше пайплайн берёт её из кэша без сети. Имя
  # модели берётся из кода (`embeddings.MODEL_NAME`), чтобы не дублировать и не
  # рассинхронизироваться. Сервис завершается успехом.
  model-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-agent:latest
    environment:
      FASTEMBED_CACHE_PATH: /models
    entrypoint: ["python", "-c"]
    command:
      - "from fastembed import TextEmbedding; from job_agent.embeddings import MODEL_NAME; TextEmbedding(model_name=MODEL_NAME); print('embedding model ready:', MODEL_NAME)"
    volumes:
      - model_cache:/models
    restart: "no"

  # Self-host web-поиск для анализа компании на стадии скоринга.
  searxng:
    image: searxng/searxng:latest
    environment:
      # Внутри compose-сети пайплайн ходит на http://searxng:8080.
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - searxng_config:/etc/searxng
    ports:
      # Открыт на localhost для отладки/калибровки; продукт не хостит наружу.
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  # Основной пайплайн: по умолчанию ночной инкрементальный прогон по расписанию.
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-agent:latest
    depends_on:
      model-init:
        condition: service_completed_successfully
      searxng:
        condition: service_started
    environment:
      FASTEMBED_CACHE_PATH: /models
      JOB_AGENT_SEEN_DB: /var/lib/job-agent/job_agent_seen.db
    env_file:
      # Секреты (API-ключи, Telethon, токен бота) — только через .env, не в образ.
      - path: .env
        required: false
    volumes:
      # Данные участника: config.json, резюме, шаблоны, карта поиска, выходной xlsx.
      - ${JOB_AGENT_DATA:-./data}:/data
      # Кэш модели эмбеддингов (read-only — пишет только model-init).
      - model_cache:/models:ro
      # Том для seen-store (дедуп/водяной знак nightly) — переживает пересоздание.
      - seen_store:/var/lib/job-agent
    restart: unless-stopped

  # Web-UI (экраны «Настройка»/«Подборка») в браузере. Тот же образ, но вместо
  # ночного прогона поднимает FastAPI-приложение uvicorn'ом. Внутри слушает
  # 0.0.0.0, наружу опубликован только на loopback хоста — продукт не хостится
  # наружу. Форма сохранения пишет /data/config.json (валидный по схеме).
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-agent:latest
    environment:
      # webui лежит в /app (не отдельный пакет) — кладём его на путь импорта.
      PYTHONPATH: /app
    entrypoint: ["python", "-c"]
    command:
      - "import uvicorn; from webui.app import create_app; uvicorn.run(create_app('/data/config.json'), host='0.0.0.0', port=8765)"
    volumes:
      # Тот же каталог данных, что и у пайплайна: читает/пишет config.json.
      - ${JOB_AGENT_DATA:-./data}:/data
    ports:
      # Только localhost хоста — открыть UI в браузере на http://127.0.0.1:8766.
      # Внутри контейнера приложение слушает 8765 (дефолт UI); наружу публикуем
      # на 8766, т.к. 8765 на хосте может быть занят другим сервисом.
      - "127.0.0.1:8766:8765"
    restart: unless-stopped

volumes:
  model_cache:
  seen_store:
  searxng_config:
